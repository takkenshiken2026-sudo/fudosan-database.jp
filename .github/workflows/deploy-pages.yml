name: Build & Deploy Site

# 静的サイトをビルドして gh-pages へ公開する自動デプロイ。
# - main への push で自動実行（＝マージするだけで公開まで回る）
# - 手動実行（Run workflow）にも対応
# - 毎週日曜に再ビルド（データ更新の反映用）
#
# データDB（data/reinfolib.db）は Actions キャッシュで再利用し、
# キャッシュが無い初回だけ「data-seed」リリースの reinfolib.db を取得する。
# 取引データが極端に少ない場合はデプロイを中止し、本番の空データ上書きを防ぐ。

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "tools/**"
      - "seo/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
    inputs:
      full_build:
        description: "全ページを静的生成（時間がかかります）"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
  schedule:
    - cron: "0 18 * * 0"

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

env:
  SITE_URL: https://fudosan-database.jp
  GITHUB_PAGES_CNAME: fudosan-database.jp
  MIN_TRANSACTIONS: "5000"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore data DB from cache
        id: dbcache
        uses: actions/cache@v4
        with:
          path: data/reinfolib.db
          key: reinfolib-db-v1

      - name: Seed DB from data-seed release (cache miss only)
        if: steps.dbcache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          if gh release download data-seed \
               --repo "$GITHUB_REPOSITORY" \
               --pattern "reinfolib.db" \
               --output data/reinfolib.db 2>/dev/null; then
            echo "Seeded data/reinfolib.db from 'data-seed' release."
          else
            echo "::warning::'data-seed' リリースが見つかりません。DB を用意できませんでした。"
          fi

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Guard against empty-data deploy
        run: |
          python3 - <<'PY'
          import os, sqlite3, sys
          db = "data/reinfolib.db"
          if not os.path.exists(db):
              sys.exit("ABORT: data/reinfolib.db がありません。"
                       "『data-seed』リリースに reinfolib.db をアップロードしてください。")
          try:
              con = sqlite3.connect(db)
              n = con.execute("SELECT COUNT(*) FROM trade_transactions").fetchone()[0]
          except Exception as e:
              sys.exit(f"ABORT: DB を読み取れません: {e}")
          finally:
              try:
                  con.close()
              except Exception:
                  pass
          threshold = int(os.environ.get("MIN_TRANSACTIONS", "5000"))
          print(f"trade_transactions = {n:,} (threshold {threshold:,})")
          if n < threshold:
              sys.exit(f"ABORT: 取引データが少なすぎます（{n} < {threshold}）。"
                       "本番の空データ上書きを防ぐためデプロイを中止します。")
          print("OK: データ量は十分です。デプロイを続行します。")
          PY

      - name: Prewarm purchase insights
        run: python3 tools/prewarm_purchase_insights.py --jobs 2

      - name: Build static site
        run: |
          ARGS="--full"
          if [ "${{ github.event.inputs.full_build }}" = "false" ]; then
            ARGS=""
          fi
          python3 tools/build_public_site.py --jobs 2 $ARGS

      - name: Verify build output
        run: |
          test -f public_site/index.html || { echo "ABORT: ビルド結果が空です"; exit 1; }
          test -f public_site/satei/index.html && echo "査定ページを生成しました" || echo "::warning::satei ページが生成されていません"

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public_site
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy static site $(date -u +%Y-%m-%dT%H:%MZ)"
          git push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
          echo "Deployed to gh-pages."
