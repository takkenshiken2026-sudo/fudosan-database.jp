app = 'fudosan-database-jp'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  SITE_URL = 'https://fudosan-database.jp'
  DATABASE_URL = 'sqlite:///./data/reinfolib.db'

[mounts]
  source = 'reinfolib_data'
  destination = '/app/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 15

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
